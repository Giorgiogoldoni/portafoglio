name: RAPTOR Daily Update

on:
  schedule:
    # Ogni giorno alle 11:00 UTC = 12:00 CET (13:00 CEST in estate)
    - cron: '0 11 * * *'
  workflow_dispatch:  # Avvio manuale da GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dipendenze
        run: pip install -r requirements.txt

      - name: Esegui RAPTOR update
        env:
          FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:        ${{ secrets.NOTIFY_EMAIL }}
          PAGES_URL:           https://giorgiogoldoni.github.io/raptor-macro-mover
        run: python scripts/update.py

      - name: Commit dati aggiornati
        run: |
          git config user.name  "RAPTOR Bot"
          git config user.email "raptor-bot@noreply"
          git add data/latest.json
          git diff --staged --quiet || git commit -m "data: update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
