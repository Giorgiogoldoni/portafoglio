name: 🔮 RAPTOR Macro Mover — Aggiorna scenari e allocazione

on:
  schedule:
    - cron: '0 11 * * 1-5'    # 13:00 IT (11:00 UTC) — giorni feriali
  workflow_dispatch:            # avvio manuale dal pannello GitHub

jobs:
  update-macro-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          pip install --upgrade pip
          pip install requests pandas numpy yfinance groq

      # ── 3. Script principale (genera latest.json) ─────────────
      - name: Aggiorna latest.json
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python fetch_macro_data.py

      # ── 4. Aggiorna storico allocazioni ───────────────────────
      - name: Aggiorna allocation_history.json
        run: python update_allocation.py

      # ── 5. Ottimizza portafoglio (Macro × Momentum) ───────────
      - name: Ottimizza portafoglio
        run: python update_portfolio.py

      # ── 6. Commit e push ──────────────────────────────────────
      - name: Commit dati aggiornati
        run: |
          git config user.name  "raptor-bot"
          git config user.email "raptor-bot@github.com"
          git add data/latest.json data/allocation_history.json data/portfolio.json
          git diff --staged --quiet || git commit -m "🔮 Macro Mover update — $(date -u '+%d/%m/%Y %H:%M UTC')"
          git push
