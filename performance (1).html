<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAPTOR — Performance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --surface: #f8f9fa;
    --border: #e9ecef;
    --text: #212529;
    --text-muted: #6c757d;
    --raptor: #1a1a2e;
    --accent: #e63946;
    --iwmo: #2196f3;
    --vnga: #4caf50;
    --up: #2e7d32;
    --down: #c62828;
    --hold: #6c757d;
    --partial: #f57c00;
    --rebalance: #1565c0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  /* HEADER */
  header {
    background: var(--raptor);
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  header .subtitle { font-size: 12px; opacity: 0.6; margin-top: 2px; }
  nav a {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 13px;
    margin-left: 16px;
  }
  nav a:hover { color: #fff; }

  /* LAYOUT */
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

  /* STAT CARDS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .stat-card .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-card .value { font-size: 22px; font-weight: 700; }
  .stat-card .sub   { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .pos { color: var(--up); }
  .neg { color: var(--down); }
  .neu { color: var(--text-muted); }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  /* CHART */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .chart-wrap h2 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .chart-container { position: relative; height: 300px; }

  /* SECTION TITLE */
  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  /* DIARY TABLE */
  .diary-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .diary-wrap h2 {
    font-size: 14px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: #f1f3f5;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8f9fa; }
  tbody td { padding: 10px 14px; font-size: 13px; vertical-align: top; }

  /* BADGE */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .badge-HOLD      { background: #f1f3f5; color: var(--hold); }
  .badge-PARTIAL   { background: #fff3e0; color: var(--partial); }
  .badge-REBALANCE { background: #e3f2fd; color: var(--rebalance); }
  .badge-INIT      { background: #f3e5f5; color: #6a1b9a; }

  /* MOVES */
  .move-in  { color: var(--up);   font-weight: 600; }
  .move-out { color: var(--down); font-weight: 600; }
  .move-up  { color: var(--up); }
  .move-dn  { color: var(--down); }

  .moves-list { font-size: 12px; line-height: 1.7; }

  /* NAV number in diary */
  .nav-cell { font-weight: 700; font-size: 14px; }
  .nav-ret  { font-size: 11px; color: var(--text-muted); }

  /* LOADING */
  #loading { text-align: center; padding: 60px; color: var(--text-muted); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    tbody td { font-size: 12px; padding: 8px 10px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>RAPTOR — Performance</h1>
    <div class="subtitle">NAV dal giorno 0 · confronto IWMO vs VNGA80</div>
  </div>
  <nav>
    <a href="index.html">← Portfolio</a>
    <a href="composizione.html">Composizione</a>
    <a href="regimi.html">Regimi</a>
    <a href="macro.html">Macro</a>
  </nav>
</header>

<div class="container">
  <div id="loading">Caricamento dati...</div>
  <div id="content" style="display:none">

    <!-- STAT CARDS -->
    <div class="stats-grid" id="stats-grid"></div>

    <!-- GRAFICO NAV -->
    <div class="chart-wrap">
      <h2>NAV cumulata (base 100)</h2>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#e63946"></div> RAPTOR Portfolio</div>
        <div class="legend-item"><div class="legend-dot" style="background:#2196f3"></div> IWMO (momentum)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4caf50"></div> VNGA80 (bilanciato)</div>
      </div>
      <div class="chart-container">
        <canvas id="navChart"></canvas>
      </div>
    </div>

    <!-- DIARIO MOVIMENTI -->
    <div class="diary-wrap">
      <h2>📓 Diario movimenti</h2>
      <div id="diary-body"></div>
    </div>

  </div>
</div>

<script>
const DATA_URL     = 'nav_history.json';
const PORTFOLIO_URL = 'data/portfolio.json';

async function load() {
  let nav = [], portfolio = { history: [] };
  try { nav = await fetch(DATA_URL).then(r => r.json()); } catch(e) { console.warn('nav_history:', e); }
  try { portfolio = await fetch(PORTFOLIO_URL).then(r => r.json()); } catch(e) { console.warn('portfolio:', e); }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  renderStats(nav);
  renderChart(nav);
  renderDiary(portfolio.history || [], nav);
}

// ── STATISTICHE ───────────────────────────────────────────────────
function renderStats(nav) {
  if (!nav.length) {
    document.getElementById('stats-grid').innerHTML = '<div class="empty">Nessun dato NAV disponibile ancora.<br>Il primo punto verrà registrato al prossimo aggiornamento.</div>';
    return;
  }

  const first = nav[0];
  const last  = nav[nav.length - 1];

  // Rendimento totale
  const retPort   = ((last.nav    / first.nav    - 1) * 100).toFixed(2);
  const retIwmo   = ((last.iwmo   / first.iwmo   - 1) * 100).toFixed(2);
  const retVnga   = ((last.vnga80 / first.vnga80 - 1) * 100).toFixed(2);

  // Rendimento ultima sessione
  const prev      = nav.length > 1 ? nav[nav.length - 2] : null;
  const retDay    = prev ? ((last.nav    / prev.nav    - 1) * 100).toFixed(2) : '—';
  const retDayIw  = prev ? ((last.iwmo   / prev.iwmo   - 1) * 100).toFixed(2) : '—';
  const retDayVg  = prev ? ((last.vnga80 / prev.vnga80 - 1) * 100).toFixed(2) : '—';

  // Max drawdown portafoglio
  let peak = nav[0].nav, maxDD = 0;
  for (const p of nav) {
    if (p.nav > peak) peak = p.nav;
    const dd = (p.nav - peak) / peak * 100;
    if (dd < maxDD) maxDD = dd;
  }

  // Giorni tracciati (distinti)
  const days = new Set(nav.map(p => p.date)).size;

  const fmt  = (v, sign=true) => {
    const n = parseFloat(v);
    if (isNaN(n)) return '<span class="neu">—</span>';
    const cls = n > 0 ? 'pos' : n < 0 ? 'neg' : 'neu';
    return `<span class="${cls}">${sign && n > 0 ? '+' : ''}${v}%</span>`;
  };

  const cards = [
    { label: 'NAV Corrente',      value: last.nav.toFixed(2),    sub: `da ${first.date}` },
    { label: 'Rendimento totale', value: fmt(retPort),            sub: `IWMO ${fmt(retIwmo)} · VNGA80 ${fmt(retVnga)}` },
    { label: 'Ultima sessione',   value: fmt(retDay),             sub: `IWMO ${fmt(retDayIw)} · VNGA80 ${fmt(retDayVg)}` },
    { label: 'Max Drawdown',      value: `<span class="${maxDD < -5 ? 'neg' : maxDD < 0 ? 'partial' : 'neu'}">${maxDD.toFixed(2)}%</span>`, sub: 'dal picco' },
    { label: 'Giorni tracciati',  value: days,                    sub: `${nav.length} aggiornamenti` },
    { label: 'Alpha vs IWMO',     value: fmt((parseFloat(retPort) - parseFloat(retIwmo)).toFixed(2)), sub: 'rendimento differenziale' },
  ];

  document.getElementById('stats-grid').innerHTML = cards.map(c =>
    `<div class="stat-card">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
      <div class="sub">${c.sub}</div>
    </div>`
  ).join('');
}

// ── GRAFICO ───────────────────────────────────────────────────────
function renderChart(nav) {
  if (!nav.length) return;

  // Raggruppa per data: prendi l'ultimo punto di ogni giorno
  const byDate = {};
  for (const p of nav) { byDate[p.date] = p; }
  const daily = Object.values(byDate).sort((a,b) => a.date.localeCompare(b.date));

  const labels = daily.map(p => p.date);
  const dPort  = daily.map(p => p.nav);
  const dIwmo  = daily.map(p => p.iwmo);
  const dVnga  = daily.map(p => p.vnga80);

  const ctx = document.getElementById('navChart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'RAPTOR', data: dPort, borderColor: '#e63946', backgroundColor: 'rgba(230,57,70,0.06)', borderWidth: 2.5, pointRadius: daily.length > 30 ? 0 : 3, tension: 0.3, fill: true },
        { label: 'IWMO',   data: dIwmo, borderColor: '#2196f3', backgroundColor: 'transparent',           borderWidth: 1.8, pointRadius: 0, tension: 0.3, borderDash: [4,3] },
        { label: 'VNGA80', data: dVnga, borderColor: '#4caf50', backgroundColor: 'transparent',           borderWidth: 1.8, pointRadius: 0, tension: 0.3, borderDash: [2,4] },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}`
          }
        }
      },
      scales: {
        x: {
          ticks: { maxTicksLimit: 10, font: { size: 11 }, color: '#888' },
          grid:  { color: '#f0f0f0' }
        },
        y: {
          ticks: { font: { size: 11 }, color: '#888', callback: v => v.toFixed(1) },
          grid:  { color: '#f0f0f0' }
        }
      }
    }
  });
}

// ── DIARIO ────────────────────────────────────────────────────────
function renderDiary(history, nav) {
  const el = document.getElementById('diary-body');
  if (!history.length) {
    el.innerHTML = '<div class="empty">Nessun movimento registrato ancora.</div>';
    return;
  }

  // Costruisci mappa NAV per data (ultimo punto del giorno)
  const navByDate = {};
  for (const p of nav) { navByDate[p.date] = p; }

  const rows = history.map((week, idx) => {
    const prev = history[idx + 1] || null;

    // Entrate/uscite
    const currTickers = new Set((week.portfolio || []).map(e => e.ticker));
    const prevTickers = prev ? new Set((prev.portfolio || []).map(e => e.ticker)) : new Set();
    const entered = [...currTickers].filter(t => !prevTickers.has(t));
    const exited  = prev ? [...prevTickers].filter(t => !currTickers.has(t)) : [];

    // Delta pesi significativi (|delta| >= 2)
    const deltas = (week.portfolio || [])
      .filter(e => Math.abs(e.weight_delta || 0) >= 2 && !entered.includes(e.ticker))
      .sort((a,b) => Math.abs(b.weight_delta) - Math.abs(a.weight_delta))
      .slice(0, 4);

    // NAV del giorno
    const navPt = navByDate[week.date];
    const navStr = navPt
      ? `<div class="nav-cell">${navPt.nav.toFixed(2)}</div><div class="nav-ret">${navPt.ret_port >= 0 ? '+' : ''}${(navPt.ret_port || 0).toFixed(2)}%</div>`
      : '<div class="nav-cell">—</div>';

    // Moves HTML
    let movesHtml = '<div class="moves-list">';
    if (entered.length) movesHtml += entered.map(t => `<span class="move-in">▲ ${t}</span>`).join(' ');
    if (exited.length)  movesHtml += (entered.length ? ' · ' : '') + exited.map(t => `<span class="move-out">▼ ${t}</span>`).join(' ');
    if (deltas.length) {
      if (entered.length || exited.length) movesHtml += '<br>';
      movesHtml += deltas.map(e => {
        const d = e.weight_delta || 0;
        const cls = d > 0 ? 'move-up' : 'move-dn';
        return `<span class="${cls}">${e.ticker} ${d > 0 ? '+' : ''}${d}%</span>`;
      }).join(' · ');
    }
    if (!entered.length && !exited.length && !deltas.length) {
      movesHtml += '<span style="color:#aaa">nessuna variazione</span>';
    }
    movesHtml += '</div>';

    const badgeCls = `badge badge-${week.rebalance || 'HOLD'}`;
    return `<tr>
      <td style="white-space:nowrap;color:var(--text-muted)">${week.date}</td>
      <td><span class="${badgeCls}">${week.rebalance || 'HOLD'}</span></td>
      <td style="max-width:180px;font-size:12px;color:var(--text-muted)">${week.regime || '—'}</td>
      <td>${movesHtml}</td>
      <td style="white-space:nowrap;text-align:right">${navStr}</td>
    </tr>`;
  });

  el.innerHTML = `<table>
    <thead>
      <tr>
        <th>Data</th>
        <th>Segnale</th>
        <th>Regime</th>
        <th>Movimenti</th>
        <th style="text-align:right">NAV</th>
      </tr>
    </thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

load();
</script>
</body>
</html>
