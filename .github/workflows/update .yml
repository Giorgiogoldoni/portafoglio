name: 🔮 RAPTOR Macro Mover — Aggiorna scenari e allocazione

on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  update-macro-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          pip install --upgrade pip
          pip install requests pandas numpy yfinance groq

      - name: Aggiorna latest.json
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/update.py

      - name: Aggiorna allocation_history.json
        run: python update_allocation.py

      - name: Ottimizza portafoglio
        run: python update_portfolio.py

      - name: Commit dati aggiornati
        run: |
          git config user.name  "raptor-bot"
          git config user.email "raptor-bot@github.com"
          git add data/latest.json data/allocation_history.json data/portfolio.json
          git diff --staged --quiet || git commit -m "🔮 Macro Mover update — $(date -u '+%d/%m/%Y %H:%M UTC')"
          git push
