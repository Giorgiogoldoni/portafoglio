name: Portafoglio Update

on:
  schedule:
    # Macro Mover — ogni giorno alle 08:00 UTC (10:00 CET)
    - cron: '0 8 * * 1-5'
    # Portfolio — ogni giorno alle 08:30 UTC (10:30 CET)
    - cron: '30 8 * * 1-5'
  workflow_dispatch:
    inputs:
      job:
        description: 'Job da eseguire'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - macro
          - portfolio

jobs:
  # ── JOB MACRO MOVER ───────────────────────────────────────
  macro:
    name: Macro Mover Update
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'macro' || github.event.inputs.job == 'both'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests --break-system-packages -q

      - name: Run Macro Mover
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER:            ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:          ${{ secrets.NOTIFY_EMAIL }}
          PAGES_URL:             https://giorgiogoldoni.github.io/portafoglio/
        run: python scripts/update.py

      - name: Commit & push
        run: |
          git config user.name  "raptor-bot"
          git config user.email "raptor-bot@users.noreply.github.com"
          git add data/latest.json
          git diff --staged --quiet || git commit -m "🔮 Macro Mover update — $(date -u +'%d/%m/%Y %H:%M') UTC"
          git push

  # ── JOB PORTFOLIO ─────────────────────────────────────────
  portfolio:
    name: Portfolio Update
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    needs: macro
    if: |
      always() && (
        (github.event_name == 'schedule' && github.event.schedule == '30 8 * * 1-5') ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'portfolio' || github.event.inputs.job == 'both'))
      )
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance numpy --break-system-packages -q

      - name: Run Portfolio Optimizer
        run: python update_portfolio.py

      - name: Commit & push
        run: |
          git config user.name  "raptor-bot"
          git config user.email "raptor-bot@users.noreply.github.com"
          git add data/portfolio.json
          git diff --staged --quiet || git commit -m "📐 Portfolio update — $(date -u +'%d/%m/%Y %H:%M') UTC"
          git push
